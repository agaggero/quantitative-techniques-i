project:
  type: book
  output-dir: _output

book:
  title: "Quantitative Techniques I"
  subtitle: "Descriptive Statistics, Probability, and Index Numbers"
  author: "Alessio Gaggero"
  date: today
  language: en
  description: |
    An open undergraduate textbook for Quantitative Techniques I
    (Técnicas Cuantitativas I) at the University of Granada.
    Consolidates lecture notes, R labs, and interactive
    self-assessments into a single reproducible volume covering
    descriptive statistics, probability, random variables, discrete
    distributions, index numbers, and descriptive time-series
    analysis.

  chapters:
    - index.qmd
    - chapters/01-univariate.qmd
    - chapters/02-bivariate.qmd
    - chapters/03-probability.qmd
    - chapters/04-random-variables.qmd
    - chapters/05-distributions.qmd
    - chapters/06-index-numbers.qmd
    - chapters/07-time-series.qmd

  appendices:
    - chapters/appendix-a-prerequisites.qmd
    - chapters/appendix-b-tables.qmd
    - chapters/appendix-c-formula-sheet.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    number-sections: true
    toc: true
    toc-depth: 3
    code-fold: show
    code-tools: true
    mathjax: true
    fig-align: center

  pdf:
    documentclass: scrbook
    papersize: a4
    geometry:
      - margin=2.5cm
    number-sections: true
    toc: true
    toc-depth: 2
    fig-align: center
    keep-tex: true
    include-in-header:
      text: |
        \usepackage{booktabs}
        \usepackage{amsmath,amssymb,amsthm,mathtools}
        \usepackage{bm}
        \usepackage{lettrine}

        % --- Thesis-style title page (title between hrules) ---
        \makeatletter
        \renewcommand{\maketitle}{%
          \begin{titlepage}
            \centering
            \vspace*{4cm}

            \hrule
            \vspace{1cm}

            {\Huge\bfseries \@title\par}
            \ifx\@subtitle\@empty\else
              \vspace{0.5cm}
              {\Large\itshape \@subtitle\par}
            \fi
            \vspace{1cm}
            \hrule

            \vspace{3cm}

            {\large\scshape \@author\par}

            \vspace{2cm}

            {\normalsize Open educational resource published by the\\[0.3em]
                         Faculty of Economics and Business Studies,\\[0.3em]
                         \textsc{Universidad de Granada}\par}

            \vspace{3cm}

            {\large\scshape \@date\par}

            \vfill

            {\footnotesize Released under Creative Commons Attribution 4.0 International (CC BY 4.0)\par}
            \vspace{0.5cm}
          \end{titlepage}
          \cleardoublepage
        }

        % --- Thesis-style chapter heads ---
        \def\thickhrulefill{\leavevmode \leaders \hrule height 1ex \hfill \kern \z@}
        \def\@makechapterhead#1{%
          \vspace*{10\p@}%
          {\parindent \z@ \centering \reset@font
            \thickhrulefill\quad
            \scshape \@chapapp{} \thechapter
            \quad \thickhrulefill
            \par\nobreak
            \vspace*{10\p@}%
            \hrule
            \vspace*{10\p@}%
            \Huge \bfseries #1\par\nobreak
            \par
            \vspace*{10\p@}%
            \hrule
            \vskip 60\p@
          }
        }
        \def\@makeschapterhead#1{%
          \vspace*{10\p@}%
          {\parindent \z@ \centering \reset@font
            \thickhrulefill
            \par\nobreak
            \vspace*{10\p@}%
            \hrule
            \vspace*{10\p@}%
            \Huge \bfseries #1\par\nobreak
            \par
            \vspace*{10\p@}%
            \hrule
            \vskip 50\p@
          }
        }
        \makeatother

bibliography: ../references.bib

license: "CC BY 4.0"

execute:
  echo: true
  warning: false
  message: false
  freeze: auto

knitr:
  opts_chunk:
    fig.width: 7
    fig.height: 5
    fig.align: center
    comment: ""
